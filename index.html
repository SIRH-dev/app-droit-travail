<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexStudy — Droit du Travail 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">⚖️ LexStudy</div>
    <nav class="top-nav">
      <button onclick="showScreen('home')">Accueil</button>
      <button onclick="showScreen('fiches')">Fiches</button>
      <button onclick="showScreen('chat')">Juriste IA</button>
    </nav>
    <div class="header-actions">
      <div class="progress-chip" id="global-progress">0/28</div>
    </div>
  </div>
</header>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <h2>Bienvenue sur LexStudy</h2>
    <p>Inscrivez-vous pour déverrouiller l'accès aux 28 fiches et au Juriste IA 2026.</p>
    <div id="subscribe-success" style="display:none; color:var(--accent); margin-bottom:15px; font-weight:bold;">🎉 Accès accordé !</div>
    <form id="subscribe-form" onsubmit="submitSubscribe(event)">
      <input type="email" id="subscribe-email" placeholder="votre@email.com" required>
      <button type="submit" id="subscribe-submit">Accéder au site →</button>
    </form>
  </div>
</div>

<div id="screen-home" class="screen active">
  <div class="home-hero">
    <h1>Maîtrisez le Droit du Travail</h1>
    <button class="btn-primary" onclick="showScreen('fiches')">Commencer à réviser</button>
  </div>
</div>

<div id="screen-fiches" class="screen">
  <div id="fiches-list"></div>
</div>

<div id="screen-reader" class="screen">
  <div class="reader-container">
    <button class="btn-back" onclick="showScreen('fiches')">← Retour</button>
    <div class="fiche-content" id="fiche-content-area"></div>
  </div>
</div>

<div id="screen-chat" class="screen">
  <div class="chat-container">
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Posez une question..." onkeydown="if(event.key==='Enter') sendChat()">
      <button class="chat-send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
