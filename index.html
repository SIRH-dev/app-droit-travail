<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexStudy — Droit du Travail 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">⚖️ LexStudy</div>
    <nav class="top-nav">
      <button onclick="showScreen('home')">Accueil</button>
      <button onclick="showScreen('fiches')">Fiches</button>
      <button onclick="showScreen('chat')">Juriste IA</button>
    </nav>
    <div class="header-actions">
      <div class="progress-chip" id="global-progress">0/28</div>
    </div>
  </div>
</header>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div style="font-size:26px; font-weight:900; color:var(--accent); margin-bottom:10px;">Bienvenue sur LexStudy</div>
    <p style="margin-bottom:25px;">Inscrivez-vous pour déverrouiller l'accès gratuit aux 28 fiches et au Juriste IA 2026.</p>
    
    <div id="subscribe-success" style="display:none; color:var(--accent); font-weight:bold; margin-bottom:15px;">🎉 Accès accordé !</div>
    
    <form id="subscribe-form" onsubmit="submitSubscribe(event)">
      <input type="email" id="subscribe-email" placeholder="votre@email.com" required 
             style="width:100%; padding:14px; border-radius:12px; border:1px solid var(--glass-border); background:rgba(0,0,0,0.3); color:#fff; margin-bottom:15px; outline:none;">
      <button type="submit" id="subscribe-submit">Accéder au site →</button>
    </form>
  </div>
</div>

<div id="screen-home" class="screen active">
  <div style="text-align:center; padding:50px 20px;">
    <h1>Maîtrisez le Droit du Travail</h1>
    <button class="btn-primary" style="max-width:200px;" onclick="showScreen('fiches')">Commencer à réviser</button>
  </div>
</div>

<div id="screen-fiches" class="screen"><div id="fiches-list"></div></div>

<div id="screen-reader" class="screen">
  <div class="reader-container">
    <button class="btn-primary" onclick="showScreen('fiches')" style="width:auto; margin-bottom:20px;">← Retour</button>
    <div class="fiche-content" id="fiche-content-area"></div>
  </div>
</div>

<div id="screen-chat" class="screen">
  <div style="max-width:600px; margin: 0 auto; padding:20px;">
    <div id="chat-messages" style="height:400px; overflow-y:auto; margin-bottom:20px;"></div>
    <input type="text" id="chat-input" placeholder="Posez votre question..." onkeydown="if(event.key==='Enter') sendChat()"
           style="width:100%; padding:15px; border-radius:15px; background:var(--glass); border:1px solid var(--glass-border); color:#fff;">
  </div>
</div>

<div class="premium-overlay" id="premium-overlay" style="display:none;">
    <div class="modal-box">
        <h3>Espace Membre</h3>
        <p>Cette section nécessite un code d'accès.</p>
        <input type="text" id="premium-code-input" placeholder="Code Ko-fi">
        <button onclick="submitPremiumCode()">Activer</button>
        <button onclick="closePremium()">Annuler</button>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
